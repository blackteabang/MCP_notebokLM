<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title id="page-title">NotebookLM Web Assistant</title>
    <!-- Use Marked.js to parse markdown responses into HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    
    <!-- NICKNAME OVERLAY -->
    <div id="nickname-overlay" class="nickname-wrapper hidden">
        <div class="glass-container nickname-modal">
            <h2 class="gradient-text">환영합니다!</h2>
            <p class="subtitle" style="margin-bottom: 24px;">대화를 시작하기 위해 닉네임을 입력해 주세요.</p>
            <form id="nickname-form" class="auth-form">
                <input type="text" id="nickname-input" placeholder="닉네임을 입력하세요..." required autocomplete="off">
                <button type="submit" class="auth-btn">시작하기</button>
            </form>
        </div>
    </div>

    <!-- MAIN CHAT SCREEN -->
    <div id="main-screen" class="glass-container main-wrapper hidden">
        <header class="header">
            <div class="header-content">
                <div>
                    <h1 id="main-service-name" class="gradient-text">리맨 지식 정보 AI</h1>
                    <p id="main-subtitle" class="subtitle">규정, 가이드, 사내 문서 등 어떤 내용이든 부담 없이 물어보세요</p>
                </div>
                <div class="header-actions">
                    <button id="history-btn" class="icon-btn" onclick="location.href='/history'" title="질문 히스토리">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-history"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
                    </button>
                </div>
            </div>
        </header>

        <main class="chat-container">
            <div id="chat-messages" class="messages-area">
                <!-- Chat messages will be injected here -->
                <div class="message system-msg">
                    <div class="avatar">🤖</div>
                    <div id="welcome-message" class="msg-content">안녕하세요. 리맨의 AI Jung 입니다. 무엇이 궁금하세요?</div>
                </div>
            </div>
            
            <div class="typing-indicator hidden" id="typing-indicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </main>

        <footer class="input-area glass-container">
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="질문을 입력하세요..." autocomplete="off" required>
                <button type="submit" id="send-btn">전송</button>
            </form>
        </footer>
    </div>
    
    <script src="app.js?v=1.1"></script>
</body>
</html>
